<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberEarn Elite - Task System</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@600;900&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, runTransaction, collection, getDocs, query, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Your Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBvRdNBtvE5O9yAKSH1gILL2Hd19re-t7Q",
            authDomain: "income-app-d691c.firebaseapp.com",
            projectId: "income-app-d691c",
            storageBucket: "income-app-d691c.firebasestorage.app",
            messagingSenderId: "667278080833",
            appId: "1:667278080833:web:0ca6e35d00e851d378bfc0",
            measurementId: "G-F496RYQ547"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Global variables
        const tg = window.Telegram.WebApp;
        tg.expand();
        const userData = tg.initDataUnsafe?.user || { id: "0000", first_name: "Guest", photo_url: "" };
        const userId = userData.id.toString();

        // UI Elements
        const taskGrid = document.getElementById('taskGrid');
        const zymBal = document.getElementById('zym-bal');
        const profileName = document.getElementById('profile-name');
        const profileId = document.getElementById('profile-id');
        const profileImg = document.getElementById('profile-img');
        const holdModal = document.getElementById('hold-modal');
        const syncBtn = document.getElementById('sync-btn');

        let totalTasks = 0; // Firebase থেকে আসা ডাটা
        let localTasks = parseInt(localStorage.getItem('local_tasks')) || 0; 
        let lastTaskTime = parseInt(localStorage.getItem('last_task_time')) || 0;
        let userBucketId = ""; // TG Cloud থেকে আসবে

        // Initialize App
        async function init() {
            profileName.innerText = userData.first_name;
            profileId.innerText = "ID: " + userId;
            if(userData.photo_url) profileImg.src = userData.photo_url;

            // ১. টেলিগ্রাম ক্লাউড থেকে Bucket ID চেক করা
            tg.CloudStorage.getItem('user_bucket_id', async (err, value) => {
                if (value) {
                    userBucketId = value;
                    await syncFromFirebase();
                } else {
                    // নতুন ইউজার এর ক্ষেত্রে বাকেট নেই
                    totalTasks = 0;
                    render();
                }
            });
        }

        // ফায়ারবেস থেকে ডাটা আনা
        async function syncFromFirebase() {
            if(!userBucketId) return;
            const docRef = doc(db, "hold", userBucketId);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                totalTasks = data.userData[userId] || 0;
                render();
            }
        }

        // টাস্ক রেন্ডারিং
        function render() {
            zymBal.innerText = totalTasks + localTasks;
            taskGrid.innerHTML = '';
            const now = Date.now();
            const waitTime = 40000; // ৪০ সেকেন্ড

            // ২০টি টাস্কের গ্রিড
            for (let i = 1; i <= 20; i++) {
                const card = document.createElement('div');
                const isDone = i <= localTasks;
                const isCurrent = i === localTasks + 1;
                const timeDiff = now - lastTaskTime;

                if (isDone) {
                    card.className = 'task-card done';
                    card.innerHTML = `<div class="icon-box" style="color:var(--success)">${icons.done}</div><span>Task ${i}</span><button class="visit-btn">Done</button>`;
                } else if (isCurrent) {
                    if (timeDiff < waitTime) {
                        const s = Math.ceil((waitTime - timeDiff) / 1000);
                        card.className = 'task-card';
                        card.innerHTML = `<div class="icon-box" style="color:var(--warning)">${icons.visit}</div><span>Task ${i}</span><button class="visit-btn" style="background:#222;color:var(--warning)">Wait ${s}s</button>`;
                    } else {
                        card.className = 'task-card active';
                        card.innerHTML = `<div class="icon-box">${icons.visit}</div><span>Task ${i}</span><button class="visit-btn" onclick="startTask()">Start</button>`;
                    }
                } else {
                    card.className = 'task-card locked';
                    card.innerHTML = `<div class="icon-box" style="color:#444">${icons.lock}</div><span>Task ${i}</span><button class="visit-btn">Locked</button>`;
                }
                taskGrid.appendChild(card);
            }

            // ১০ এবং ২০ নম্বর টাস্কের পর পপআপ
            if (localTasks === 10 || localTasks === 20) {
                holdModal.style.display = 'flex';
            }
        }

        // টাস্ক শুরু করা
        window.startTask = function() {
            const links = [
                "https://www.effectivegatecpm.com/d4xmbr9x?key=2b5a0e093b7322fd95cdb255b75f8d19",
                "https://www.effectivegatecpm.com/hcux3wbqsd?key=67b7104cd6484dba058f498324eaafb8"
            ];
            const url = links[Math.floor(Math.random()*links.length)];
            tg.openLink(url);

            localTasks++;
            lastTaskTime = Date.now();
            localStorage.setItem('local_tasks', localTasks);
            localStorage.setItem('last_task_time', lastTaskTime);
            render();
        }

        // ফায়ারবেসে ডাটা সিঙ্ক (বাকেট লজিক)
        async function syncToFirebase() {
            syncBtn.innerHTML = '<div class="spinner"></div>';
            syncBtn.disabled = true;

            try {
                await runTransaction(db, async (transaction) => {
                    let targetBucketId = userBucketId;

                    // যদি ইউজারের বাকেট আইডি না থাকে, খালি বাকেট খোঁজো
                    if (!targetBucketId) {
                        const holdCol = collection(db, "hold");
                        const q = query(holdCol);
                        const querySnapshot = await getDocs(q);
                        
                        let found = false;
                        querySnapshot.forEach((doc) => {
                            if (!found && doc.data().totalUsers < 300) {
                                targetBucketId = doc.id;
                                found = true;
                            }
                        });

                        if (!found) {
                            targetBucketId = "bucket" + (querySnapshot.size + 1);
                        }
                    }

                    const bucketRef = doc(db, "hold", targetBucketId);
                    const bucketSnap = await transaction.get(bucketRef);

                    if (!bucketSnap.exists()) {
                        transaction.set(bucketRef, {
                            totalUsers: 1,
                            userData: { [userId]: 10 }
                        });
                    } else {
                        const data = bucketSnap.data();
                        const isNewInBucket = !data.userData[userId];
                        transaction.update(bucketRef, {
                            [`userData.${userId}`]: increment(10),
                            totalUsers: isNewInBucket ? increment(1) : increment(0)
                        });
                    }
                    
                    userBucketId = targetBucketId;
                });

                // টেলিগ্রাম ক্লাউডে বাকেট আইডি সেভ
                tg.CloudStorage.setItem('user_bucket_id', userBucketId);
                
                // রিসেট লোকাল ডাটা
                totalTasks += 10;
                localTasks = (localTasks === 10) ? 10.1 : 0; // ২০ হলে ০, ১০ হলে সাময়িক হোল্ড
                if(localTasks > 20 || localTasks === 10.1) {
                   if(localTasks === 10.1) localTasks = 10; // Logic for locking
                   if(totalTasks % 20 === 0) localTasks = 0; // Reset after 20
                }
                
                // আপনার জন্য সহজ লজিক:
                if(localTasks >= 10 && localTasks < 11) {
                    localTasks = 11; // ১০ এর ধাপ পার
                } else {
                    localTasks = 0; // ২০ এর ধাপ পার
                    localStorage.setItem('local_tasks', 0);
                }
                
                localStorage.setItem('local_tasks', localTasks);
                holdModal.style.display = 'none';
                tg.showAlert("Balance Added to Hold!");
                render();

            } catch (e) {
                console.error(e);
                alert("Update failed, try again.");
            } finally {
                syncBtn.innerHTML = 'ADD TO BALANCE';
                syncBtn.disabled = false;
            }
        }

        window.syncToFirebase = syncToFirebase;
        const icons = {
            visit: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>`,
            done: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>`,
            lock: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>`
        };

        setInterval(render, 1000);
        init();

    </script>

    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #ff007a;
            --success: #00ff88;
            --warning: #ffbd00;
            --bg: #05060b;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }

        header {
            padding: 20px; background: rgba(5,6,11,0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }

        .profile-section { display: flex; align-items: center; gap: 12px; }
        .profile-img { width: 40px; height: 40px; border-radius: 10px; border: 1.5px solid var(--primary); background: #111; object-fit: cover; }
        
        .balance-card { text-align: right; }
        .balance-val { font-family: 'Orbitron'; color: var(--primary); font-size: 1.1rem; }

        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        .task-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }

        .task-card {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 20px; padding: 15px 10px; text-align: center;
        }

        .icon-box { width: 45px; height: 45px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; color: var(--primary); }
        .icon-box svg { width: 24px; height: 24px; }

        .visit-btn {
            width: 100%; padding: 10px; border-radius: 10px; border: none;
            font-weight: 800; font-size: 10px; text-transform: uppercase; margin-top: 10px;
        }

        .active { border-color: var(--primary); }
        .active .visit-btn { background: var(--primary); color: #000; }
        .done { opacity: 0.6; border-color: var(--success); }
        .locked { opacity: 0.3; }

        /* Sync Modal */
        #hold-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 10000; display: none; align-items: center; justify-content: center; padding: 25px;
        }
        .sync-box {
            background: #0d0f1a; border: 1px solid var(--primary);
            padding: 30px; border-radius: 25px; text-align: center; width: 100%;
        }
        .spinner {
            width: 20px; height: 20px; border: 3px solid #000;
            border-top: 3px solid transparent; border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #notice-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px); z-index: 5000;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content { background: #0d0f1a; border-radius: 25px; padding: 25px; border: 1px solid var(--border); }
    </style>
</head>
<body>

<!-- ১০/২০ টাস্ক পপআপ -->
<div id="hold-modal">
    <div class="sync-box">
        <h2 style="font-family: 'Orbitron'; color: var(--primary); margin-bottom: 10px;">MILESTONE!</h2>
        <p style="color: #ccc; font-size: 14px; margin-bottom: 20px;">আপনার টাস্ক কমপ্লিট হয়েছে। নিচে ক্লিক করে আপনার হোল্ড ব্যালেন্স আপডেট করুন।</p>
        <button id="sync-btn" onclick="syncToFirebase()" class="visit-btn" style="background: var(--primary); color: #000; height: 50px; font-size: 14px;">ADD TO BALANCE</button>
    </div>
</div>

<!-- শুরুর নোটিশ -->
<div id="notice-modal" onclick="this.style.display='none'">
    <div class="modal-content">
        <h2 style="font-family: 'Orbitron'; color: var(--primary); text-align: center;">WELCOME</h2>
        <p style="margin: 15px 0; font-size: 14px; line-height: 1.6; color: #bbb;">
            এখানে ২০% সিস্টেম চার্জ প্রযোজ্য। প্রতি ১০টি টাস্ক পর পর ব্যালেন্স হোল্ড সেকশনে অ্যাড করতে হবে। কাজ শুরু করতে স্ক্রিনে ক্লিক করুন।
        </p>
        <button class="visit-btn" style="background: var(--primary); color: #000;">START NOW</button>
    </div>
</div>

<header>
    <div class="profile-section">
        <img id="profile-img" src="" class="profile-img" alt="">
        <div>
            <b id="profile-name" style="font-size: 14px; display: block;">User</b>
            <span id="profile-id" style="font-size: 10px; color: var(--primary);">ID: 000000</span>
        </div>
    </div>
    <div class="balance-card">
        <span style="font-size: 9px; color: #666; display: block; font-weight: 800;">TOTAL TASKS</span>
        <div class="balance-val"><span id="zym-bal">0</span></div>
    </div>
</header>

<div class="container">
    <h2 style="font-family: 'Orbitron'; font-size: 14px; margin-bottom: 15px; color: var(--primary);">DAILY CHALLENGE (MAX 20)</h2>
    <div class="task-grid" id="taskGrid"></div>
</div>

</body>
</html>
