<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberEarn Elite - High-End System</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Orbitron:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #ff007a;
            --success: #00ff88;
            --warning: #ffbd00;
            --bg: #040406;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 242, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 122, 0.05) 0%, transparent 40%);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            user-select: none;
        }

        /* প্রফেশনাল হেডার */
        header {
            padding: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }

        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar {
            width: 45px; height: 45px; border-radius: 12px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            padding: 2px;
        }
        .avatar img { width: 100%; height: 100%; border-radius: 10px; background: #000; }

        .balance-card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 8px 15px; border-radius: 12px;
            text-align: right;
        }
        .balance-val { font-family: 'Orbitron', sans-serif; color: var(--success); font-size: 18px; }

        .container { max-width: 500px; margin: 0 auto; padding: 25px 20px; }

        .status-header {
            text-align: center; margin-bottom: 25px;
        }
        .status-header h2 { font-size: 20px; letter-spacing: 2px; color: var(--primary); text-transform: uppercase; }

        /* গ্রিড সিস্টেম */
        .task-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }

        .task-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 5px;
            text-align: center;
            position: relative;
            transition: all 0.3s ease;
        }

        .active { border-color: var(--primary); cursor: pointer; background: rgba(0, 242, 255, 0.05); }
        .active:hover { transform: scale(1.05); border-color: #fff; }

        .waiting { border-color: var(--warning); opacity: 0.8; }
        .done { opacity: 0.3; border-color: var(--success); }
        .locked { opacity: 0.15; }

        .icon { font-size: 22px; margin-bottom: 8px; display: block; }
        .label { font-size: 10px; color: #888; text-transform: uppercase; }
        .id-num { font-family: 'Orbitron', sans-serif; font-size: 16px; display: block; margin: 3px 0; }
        .timer-label { font-size: 9px; font-weight: 800; color: var(--warning); }

        /* লিমিট ওভারলে */
        #limit-overlay {
            display: none; position: fixed; inset: 0; background: var(--bg);
            z-index: 5000; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        .countdown { font-family: 'Orbitron', sans-serif; font-size: 45px; color: var(--secondary); margin: 20px 0; }

        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #fff; color: #000; padding: 12px 25px; border-radius: 10px;
            font-size: 13px; font-weight: 700; display: none; z-index: 6000;
        }
    </style>
</head>
<body>

<div id="limit-overlay">
    <div style="font-size: 60px;">🌌</div>
    <h2 style="margin-top:20px;">DAILY QUOTA FINISHED</h2>
    <p style="color: #666;">আপনি আজকের ৪০টি ভিজিট সম্পন্ন করেছেন।</p>
    <div class="countdown" id="midnight-timer">00:00:00</div>
    <p style="color: var(--primary);">আগামীকাল নতুন লেভেল আনলক হবে</p>
</div>

<header>
    <div class="user-info">
        <div class="avatar">
            <img src="https://api.dicebear.com/7.x/bottts-neutral/svg?seed=Felix" alt="User">
        </div>
        <div>
            <b style="font-size: 14px; display: block;">AGENT_77X</b>
            <span style="font-size: 10px; color: #666;">ID: 9948271</span>
        </div>
    </div>
    <div class="balance-card">
        <span style="font-size: 9px; color: #888; display: block;">EARNINGS</span>
        <div class="balance-val"><span id="zym-bal">0</span> ZYM</div>
    </div>
</header>

<div class="container">
    <div class="status-header">
        <h2 id="level-title">LEVEL: 1 - 40</h2>
        <p style="font-size: 12px; color: #555;">Sequential Node Activation</p>
    </div>
    <div class="task-grid" id="taskGrid"></div>
</div>

<div id="toast"></div>

<script>
    // লিংকসমূহ
    const links = [
        "https://www.effectivegatecpm.com/d4xmbr9x?key=2b5a0e093b7322fd95cdb255b75f8d19",
        "https://omg10.com/4/10417851",
        "https://www.effectivegatecpm.com/hcux3wbqsd?key=67b7104cd6484dba058f498324eaafb8",
        "https://omg10.com/4/10417853"
    ];

    // --- LocalStorage ডেটা ---
    let balance = parseInt(localStorage.getItem('zym_bal')) || 0;
    let doneToday = parseInt(localStorage.getItem('zym_done')) || 0; // ০ থেকে ৪০
    let lastClick = parseInt(localStorage.getItem('zym_last_time')) || 0;
    let baseOffset = parseInt(localStorage.getItem('zym_base_id')) || 0; // ০, ৪০, ৮০...
    let lastResetDate = localStorage.getItem('zym_date');

    function checkReset() {
        const today = new Date().toDateString();
        if (lastResetDate !== today) {
            // যদি আজকে নতুন দিন হয়
            if (lastResetDate !== null) {
                // গতদিনের ৪০টি শেষ হয়েছিল কিনা চেক করে অফসেট বাড়ানো
                baseOffset += 40;
                localStorage.setItem('zym_base_id', baseOffset);
            }
            doneToday = 0;
            localStorage.setItem('zym_done', 0);
            localStorage.setItem('zym_date', today);
        }
    }

    function updateMidnightTimer() {
        const now = new Date();
        const midnight = new Date();
        midnight.setHours(24, 0, 0, 0);
        const diff = midnight - now;

        if (diff <= 0) { location.reload(); return; }

        const h = Math.floor(diff / 3600000).toString().padStart(2,'0');
        const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2,'0');
        const s = Math.floor((diff % 60000) / 1000).toString().padStart(2,'0');
        document.getElementById('midnight-timer').innerText = `${h}:${m}:${s}`;
    }

    function render() {
        checkReset();
        document.getElementById('zym-bal').innerText = balance;
        document.getElementById('level-title').innerText = `LEVEL: ${baseOffset + 1} - ${baseOffset + 40}`;

        if (doneToday >= 40) {
            document.getElementById('limit-overlay').style.display = 'flex';
            updateMidnightTimer();
            return;
        }

        const grid = document.getElementById('taskGrid');
        grid.innerHTML = '';
        const now = Date.now();
        const elapsed = now - lastClick;
        const isLockedByTimer = elapsed < 40000;

        for (let i = 0; i < 40; i++) {
            const card = document.createElement('div');
            card.className = 'task-card';
            const currentId = baseOffset + i + 1;

            if (i < doneToday) {
                // সম্পন্ন হয়েছে
                card.classList.add('done');
                card.innerHTML = `<span class="icon">✅</span><span class="label">Visit</span><span class="id-num">${currentId}</span>`;
            } 
            else if (i === doneToday) {
                // বর্তমান টার্গেট বক্স
                if (isLockedByTimer) {
                    card.classList.add('waiting');
                    const rem = Math.ceil((40000 - elapsed) / 1000);
                    card.innerHTML = `<span class="icon">⏳</span><span class="label">Wait</span><span class="id-num">${currentId}</span><span class="timer-label">${rem}s</span>`;
                } else {
                    card.classList.add('active');
                    card.innerHTML = `<span class="icon">⚡</span><span class="label">Active</span><span class="id-num">${currentId}</span>`;
                    
                    // --- আপডেট করা নির্দিষ্ট সেকশন ---
                    card.onclick = () => {
                        const targetLink = links[Math.floor(Math.random()*links.length)];
                        
                        // টেলিগ্রাম এক্সটারনাল ব্রাউজারে খোলার জন্য
                        if (window.Telegram && window.Telegram.WebApp) {
                            window.Telegram.WebApp.openLink(targetLink);
                        } else {
                            window.open(targetLink, '_blank');
                        }
                        
                        balance += 10;
                        doneToday++;
                        lastClick = Date.now();
                        
                        localStorage.setItem('zym_bal', balance);
                        localStorage.setItem('zym_done', doneToday);
                        localStorage.setItem('zym_last_time', lastClick);
                        render();
                    };
                    // --- আপডেট শেষ ---
                }
            } 
            else {
                // ভবিষ্যতের লক করা বক্স
                card.classList.add('locked');
                card.innerHTML = `<span class="icon">🔒</span><span class="label">Locked</span><span class="id-num">${currentId}</span>`;
            }
            grid.appendChild(card);
        }
    }

    setInterval(render, 1000);
    render();
</script>
</body>
</html>
