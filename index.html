<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTC Website - EarnTech</title>
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --bg: #f3f4f6; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; overflow: hidden; }

        /* Google Slide-up Panel (Vertical Half Screen) */
        #google-panel {
            position: fixed; bottom: -60%; left: 0; width: 100%; height: 50vh;
            background: white; border-top: 5px solid var(--primary);
            z-index: 1000; transition: 0.5s ease;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.2);
        }
        #google-panel.active { bottom: 0; }
        .close-panel { position: absolute; top: 15px; right: 20px; font-size: 24px; color: red; cursor: pointer; }

        /* Container */
        .container { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn { display: block; width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-google { background: #ea4335; color: white; }
        .btn-email { background: #333; color: white; }
        .btn-submit { background: var(--success); color: white; }
        .btn-back { background: #ddd; width: auto; font-size: 12px; padding: 5px 15px; margin-bottom: 10px; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .footer-text { font-size: 14px; color: #555; margin-top: 15px; }
        .link { color: var(--primary); cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        
        #math-box { background: #f9f9f9; padding: 10px; border-radius: 5px; margin: 10px 0; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Bottom Google Panel -->
    <div id="google-panel">
        <span class="close-panel" onclick="toggleGoogle(false)">×</span>
        <h3>Google Authentication</h3>
        <p>Choose your account to continue</p>
        <button class="btn btn-google" style="width: 80%" onclick="loginWithGoogle()">Continue with Google</button>
    </div>

    <div class="container">
        <!-- View 1: Login Main -->
        <div id="v-login">
            <h2>Login</h2>
            <button class="btn btn-google" onclick="toggleGoogle(true)">Login with Google</button>
            <button class="btn btn-email" onclick="show('v-email-login')">Login with Email</button>
            <p class="footer-text">do not any account, <span class="link" onclick="show('v-signup-main')">jast signup</span></p>
        </div>

        <!-- View 2: Email Login -->
        <div id="v-email-login" class="hidden">
            <button class="btn btn-back" onclick="show('v-login')">← Back</button>
            <h2>Email Login</h2>
            <input type="email" id="log-email" placeholder="Enter your Email">
            <input type="password" id="log-pass" placeholder="Enter your password">
            <button class="btn btn-submit" onclick="handleEmailLogin()">Login</button>
            <p class="footer-text">do not any account, <span class="link" onclick="show('v-signup-main')">jast signup</span></p>
        </div>

        <!-- View 3: Signup Choice -->
        <div id="v-signup-main" class="hidden">
            <h2>Signup</h2>
            <button class="btn btn-google" onclick="prepSignup('Google')">Signup with Google</button>
            <button class="btn btn-email" onclick="prepSignup('Email')">Signup with Email</button>
            <p class="footer-text">I have olready account, <span class="link" onclick="show('v-login')">jast Login</span></p>
        </div>

        <!-- View 4: Complete Signup -->
        <div id="v-signup-form" class="hidden">
            <button class="btn btn-back" onclick="show('v-signup-main')">← Back</button>
            <h2 id="sup-title">Create Account</h2>
            <input type="text" id="sup-name" placeholder="User Name">
            <input type="text" id="sup-id" readonly placeholder="Unique ID">
            
            <div id="sup-email-fields" class="hidden">
                <input type="email" id="sup-email" placeholder="Email">
                <input type="password" id="sup-pass" placeholder="Password">
                <input type="password" id="sup-conf" placeholder="Confirm Password">
            </div>

            <div id="math-box">
                <span id="math-ques"></span>
                <input type="number" id="math-ans" placeholder="Answer">
            </div>

            <button class="btn btn-submit" onclick="processSignup()">Signup</button>
            <p class="footer-text">I have olready account, <span class="link" onclick="show('v-login')">jast Login</span></p>
        </div>

        <!-- View 5: Dashboard -->
        <div id="v-dash" class="hidden">
            <h2 style="color:var(--success)">Welcome!</h2>
            <div style="text-align:left; background:#eee; padding:15px; border-radius:10px;">
                <p><b>Name:</b> <span id="d-name"></span></p>
                <p><b>ID:</b> <span id="d-id"></span></p>
            </div>
            <button class="btn btn-email" onclick="location.reload()">Logout</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvRdNBtvE5O9yAKSH1gILL2Hd19re-t7Q",
            authDomain: "income-app-d691c.firebaseapp.com", // ঝামেলা ছাড়া এটিই রাখুন
            projectId: "income-app-d691c",
            storageBucket: "income-app-d691c.firebasestorage.app",
            messagingSenderId: "667278080833",
            appId: "1:667278080833:web:0ca6e35d00e851d378bfc0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let mAns = 0; let sType = ''; let gUser = null;

        // UI Switch
        window.show = (id) => {
            document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        window.toggleGoogle = (s) => document.getElementById('google-panel').classList.toggle('active', s);

        // Generate ID & Math
        async function setupSignup() {
            let id = ""; let unique = false;
            while(!unique) {
                id = Math.floor(10000000 + Math.random() * 90000000).toString();
                if(!(await getDoc(doc(db, "users", id))).exists()) unique = true;
            }
            document.getElementById('sup-id').value = id;
            let n1 = Math.floor(Math.random()*10), n2 = Math.floor(Math.random()*10);
            mAns = n1 + n2;
            document.getElementById('math-ques').innerText = `What is ${n1} + ${n2}?`;
        }

        window.prepSignup = async (type) => {
            sType = type;
            if(type === 'Google') { toggleGoogle(true); } 
            else { show('v-signup-form'); document.getElementById('sup-email-fields').classList.remove('hidden'); await setupSignup(); }
        }

        window.loginWithGoogle = async () => {
            try {
                const res = await signInWithPopup(auth, provider);
                toggleGoogle(false);
                const q = query(collection(db, "users"), where("email", "==", res.user.email));
                const snap = await getDocs(q);
                if(!snap.empty) { snap.forEach(d => loadDash(d.data())); }
                else { 
                    gUser = res.user; show('v-signup-form'); 
                    document.getElementById('sup-name').value = gUser.displayName;
                    document.getElementById('sup-email-fields').classList.add('hidden');
                    await setupSignup();
                }
            } catch (e) { alert(e.message); }
        }

        window.processSignup = async () => {
            let name = document.getElementById('sup-name').value;
            let id = document.getElementById('sup-id').value;
            let ans = document.getElementById('math-ans').value;
            if(!name || parseInt(ans) !== mAns) return alert("Fill data correctly & solve math!");

            try {
                let email = "", aid = "";
                if(gUser) { email = gUser.email; aid = gUser.uid; }
                else {
                    email = document.getElementById('sup-email').value;
                    let p = document.getElementById('sup-pass').value;
                    let res = await createUserWithEmailAndPassword(auth, email, p);
                    aid = res.user.uid;
                }
                const data = { name, uId: id, email, authId: aid };
                await setDoc(doc(db, "users", id), data);
                loadDash(data);
            } catch (e) { alert(e.message); }
        }

        window.handleEmailLogin = async () => {
            try {
                let res = await signInWithEmailAndPassword(auth, document.getElementById('log-email').value, document.getElementById('log-pass').value);
                const q = query(collection(db, "users"), where("authId", "==", res.user.uid));
                const snap = await getDocs(q);
                snap.forEach(d => loadDash(d.data()));
            } catch (e) { alert("Login Failed!"); }
        }

        function loadDash(d) {
            document.getElementById('d-name').innerText = d.name;
            document.getElementById('d-id').innerText = d.uId;
            show('v-dash');
        }
    </script>
</body>
</html>
